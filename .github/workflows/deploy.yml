name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Remove wrangler cache
        run: rm -rf .wrangler

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy --config wrangler.json
        working-directory: dist/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Worker secrets
        working-directory: dist/server
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GH_PUBLISH_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN }}
        run: |
          echo "$ADMIN_PASSWORD" | npx wrangler secret put ADMIN_PASSWORD --config wrangler.json
          echo "$GH_PUBLISH_TOKEN" | npx wrangler secret put GITHUB_TOKEN --config wrangler.json
          echo "GerritBultmann" | npx wrangler secret put GITHUB_OWNER --config wrangler.json
          echo "fm26-save-compass" | npx wrangler secret put GITHUB_REPO --config wrangler.json
          echo "main" | npx wrangler secret put GITHUB_BRANCH --config wrangler.json
          echo "public/data/library.json" | npx wrangler secret put GITHUB_DATA_PATH --config wrangler.json
